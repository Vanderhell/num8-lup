name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2
      - name: Configure
        run: >
          cmake -S . -B build-release
          -A x64
          -DCMAKE_VS_WINDOWS_TARGET_PLATFORM_VERSION=10.0.22621.0
          -DNUM8LORA_C_STANDARD=99
          -DNUM8LORA_BUILD_HOSTED_METADATA=ON
          -DNUM8LORA_BUILD_NUM8_ADAPTER=OFF
          -DNUM8LORA_BUILD_EXAMPLES=OFF
          -DNUM8LORA_BUILD_TESTS=OFF
      - name: Build
        run: cmake --build build-release --config Release
      - name: Install
        run: cmake --install build-release --config Release --prefix "${{ github.workspace }}\install-release"
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\dist" | Out-Null
          Compress-Archive -Path "${{ github.workspace }}\install-release\*" -DestinationPath "${{ github.workspace }}\dist\num8-lup-${{ github.ref_name }}-win64.zip" -Force
      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: dist/*.zip

  package-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Package source archive
        run: |
          mkdir -p dist
          git archive --format=zip --output "dist/num8-lup-${GITHUB_REF_NAME}-source.zip" HEAD
      - uses: actions/upload-artifact@v4
        with:
          name: source-release
          path: dist/*.zip

  publish:
    runs-on: ubuntu-latest
    needs:
      - package-windows
      - package-source
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: num8-lup ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/**/*.zip
